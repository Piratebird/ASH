# Run on port 8080
server.port = 8080
server.bind = "0.0.0.0"
server.max-request-size = 16384
server.stream-response-body = 1

# Serve files from your project directory
server.document-root = "__PROJECT_ROOT__"

# Security headers
setenv.add-response-header = (
    "X-Content-Type-Options" => "nosniff",
    "X-Frame-Options" => "DENY",
    "X-XSS-Protection" => "1; mode=block"
)

# Enable Aliases, CGI, and SetEnv
server.modules = ( "mod_alias", "mod_cgi", "mod_setenv" )

# Basic file types so CSS and HTML render correctly
mimetype.assign = (
  ".html" => "text/html", 
  ".css"  => "text/css",
  ".txt"  => "text/plain",
  ".json" => "application/json",
  ".png"  => "image/png",
  ".jpg"  => "image/jpeg",
  ".svg"  => "image/svg+xml"
)

# Set the default index file to index.html
index-file.names = ( "index.html" )

# Tell Lighttpd where the cgi-bin is
alias.url = ( "/cgi-bin/" => "__PROJECT_ROOT__/cgi-bin/" )

# Tell Lighttpd to execute any .sh file in /cgi-bin/ using its shebang (#!/usr/bin/env bash)
$HTTP["url"] =~ "^/cgi-bin/" {
    cgi.assign = ( ".sh" => "" )
}
